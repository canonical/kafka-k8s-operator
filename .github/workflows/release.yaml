name: Release to Charmhub

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  tag:
    name: Create charm refresh compatibility version git tag
    uses: canonical/data-platform-workflows/.github/workflows/tag_charm_edge.yaml@v49.0.1
    with:
      track: '4'
    permissions:
      contents: write # Needed to create git tag

  ci-tests:
    needs:
      - tag
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions:
      contents: write # Needed to login to Discourse
      pull-requests: write # Need to create PR
      actions: write

  release:
    name: Release charm
    needs:
      - tag
      - ci-tests
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_edge.yaml@v49.0.1
    with:
      track: ${{ needs.tag.outputs.track }}
      artifact-prefix: ${{ needs.ci-tests.outputs.artifact-prefix }}
    secrets:
      charmhub-token: ${{ secrets.CHARMHUB_TOKEN }}
    permissions:
      contents: write  # Needed to create git tags

  trigger-release-ci:
    name: Trigger release CI
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Trigger Airflow DAG
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://airflow.data-platform.ps7.canonical.com/api/v2/dags/kafka_4.x_k8s/dagRuns" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AIRFLOW_API_TOKEN }}" \
            -d "{
              \"dag_run_id\": \"promote-${{ github.run_id }}\",
              \"logical_date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
              \"conf\": {
                \"charm\": \"kafka-k8s\",
                \"version\": \"${{ github.ref_name }}\",
                \"charm_revisions\": \"${{ needs.release.outputs.charm_revisions }}\"
              }
            }")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "$body"
          if echo "$body" | grep -q '"detail":"Token Expired"'; then
            echo "::error::Airflow API token has expired"
            exit 1
          fi
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Airflow API request failed with status $http_code"
            exit 1
          fi
    permissions: {}
